<section id="testimonials" class="py-12 md:py-16 bg-cyan-50">
  <div class="container mx-auto px-4">
    <!-- Section Title -->
    <div class="text-center mb-10">
      <h2 class="text-3xl font-bold heading">What Parents Say</h2>
      <div class="w-24 h-1 bg-base-content mx-auto mt-2"></div>
      <p class="mt-6 text-center max-w-3xl mx-auto">
        Hear from parents who have chosen David & Mary Academy for their children's early education.
      </p>
    </div>

    <!-- Testimonials Grid -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-8 max-w-5xl mx-auto">
      <div *ngFor="let testimonial of testimonials"
           class="bg-white rounded-lg p-6 shadow-md hover:shadow-lg transition duration-300">
        <!-- Rating Stars -->
        <div class="flex mb-4">
          <i *ngFor="let star of [1,2,3,4,5]"
             class="fas fa-star text-yellow-500"></i>
        </div>

        <!-- Testimonial Text -->
        <p class="text-gray-700 mb-6 italic">
          "{{ testimonial.text }}"
        </p>

        <!-- Parent Info -->
        <div class="flex items-center">
          <div class="w-12 h-12 bg-gray-200 rounded-full flex items-center justify-center mr-4">
            <i class="fas fa-user text-gray-400 text-xl"></i>
            <!-- Replace with actual photo when available: -->
            <!-- <img [src]="testimonial.photo" [alt]="testimonial.name" class="w-12 h-12 rounded-full object-cover" /> -->
          </div>
          <div>
            <p class="font-semibold">{{ testimonial.name }}</p>
            <p class="text-sm text-gray-500">{{ testimonial.relation }}</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
