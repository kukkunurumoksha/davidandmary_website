<section id="testimonials" class="py-12 md:py-16 section-light">
  <div class="container mx-auto px-4">
    <!-- Section Title -->
    <div class="text-center mb-12">
      <h2 class="text-4xl font-bold heading heading-underline inline-block">What Parents Say</h2>
      <p class="mt-8 text-lg text-gray-600 max-w-3xl mx-auto">
        Hear from parents who have chosen David & Mary Academy for their children's early education.
      </p>
    </div>

    <!-- Testimonials Grid -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-8 max-w-5xl mx-auto">
      <div *ngFor="let testimonial of testimonials"
           class="card-custom">
        <!-- Rating Stars -->
        <div class="flex mb-4">
          <i *ngFor="let star of [1,2,3,4,5]"
             class="fas fa-star text-amber-400"></i>
        </div>

        <!-- Testimonial Text -->
        <p class="text-gray-700 mb-6 italic leading-relaxed">
          "{{ testimonial.text }}"
        </p>

        <!-- Parent Info -->
        <div class="flex items-center">
          <div class="w-12 h-12 bg-gradient-to-br from-[#fbbf24] to-[#f59e0b] rounded-full flex items-center justify-center mr-4 shadow-md">
            <i class="fas fa-user text-white text-xl"></i>
            <!-- Replace with actual photo when available: -->
            <!-- <img [src]="testimonial.photo" [alt]="testimonial.name" class="w-12 h-12 rounded-full object-cover" /> -->
          </div>
          <div>
            <p class="font-bold text-[#1e3a5f]">{{ testimonial.name }}</p>
            <p class="text-sm text-gray-500">{{ testimonial.relation }}</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
